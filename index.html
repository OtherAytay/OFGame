<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OnlyFans Escort Sim</title>
    <link href="scss/custom.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
</head>

<body>
    <div class="container-fluid overflow-hidden">
        <div class="row">
            <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
                <div class="container-fluid">
                    <a class="navbar-brand text-fusion-OS" href="#">OnlyFans Escort Sim</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse justify-content-center" id="navbarSupportedContent">
                        <ul class="nav nav-pills">
                            <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="#">Options</a></li>
                            <li class="nav-item"><a class="nav-link" href="#">Stats</a></li>
                            <li class="nav-item"><a class="nav-link" href="#">Glossary</a></li>
                            <li class="nav-item"><a class="nav-link" href="#">Acknowledgements</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>

        <div class="row">
            <div id="city-panel" class="col-md-6 col-lg-4 col-xl-3 pt-3 overflow-auto vh-100"></div>
            <div class="col-md-6 col-lg-8 col-xl-9 vh-100">
                <div class="container">
                    <div id="interactive-map" class="interactive-map" style="width: 1799px ; height: 1390px"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/react/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-bootstrap@next/dist/react-bootstrap.min.js" crossorigin></script>
    <script>var Alert = ReactBootstrap.Alert;</script>
    <script src="bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <!-- https://github.com/timmywil/panzoom -->
    <script>
        var element = document.getElementById("interactive-map")
        var panzoom = Panzoom(element, {
            startScale: 0.6,
            minScale: 0.4,
            maxScale: 2,
            startX: -500,
            startY: -340,
            animate: true
        })
        element.parentElement.addEventListener('wheel', panzoom.zoomWithWheel)
    </script>
    <script src="js/utility.js"></script>
    <script src="js/info.js"></script>
    <script src="js/game.js"></script>
    <script src="js/map.js"></script>
    <script src="js/cityPanel.js"></script>
    <script>
        initializeGame();
    </script>

</body>

</html>
